<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Eligibility Check | Smart Lender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="/" class="logo">
                <i class="fas fa-shield-halved"></i>
                Smart Lender
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/predict_page">Check Eligibility</a>
                <a href="/dashboard">Analytics</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Applicant Details</h2>
            <form action="/predict" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="Gender">Gender</label>
                        <select name="Gender" id="Gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Married">Marital Status</label>
                        <select name="Married" id="Married" required>
                            <option value="">Select Status</option>
                            <option value="Yes">Married</option>
                            <option value="No">Unmarried</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Dependents">Dependents</label>
                        <select name="Dependents" id="Dependents" required>
                            <option value="">Select Number</option>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3+">3+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Education">Education</label>
                        <select name="Education" id="Education" required>
                            <option value="">Select Education</option>
                            <option value="Graduate">Graduate</option>
                            <option value="Not Graduate">Not Graduate</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Self_Employed">Self Employed</label>
                        <select name="Self_Employed" id="Self_Employed" required>
                            <option value="">Select Option</option>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="Credit_History">Credit History</label>
                        <select name="Credit_History" id="Credit_History" required>
                            <option value="">Select History</option>
                            <option value="1.0">Good (1.0)</option>
                            <option value="0.0">Poor (0.0)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="ApplicantIncome">Applicant Monthly Income ($)</label>
                        <input type="number" name="ApplicantIncome" id="ApplicantIncome" placeholder="e.g. 5000" required>
                    </div>
                    <div class="form-group">
                        <label for="CoapplicantIncome">Co-applicant Monthly Income ($)</label>
                        <input type="number" name="CoapplicantIncome" id="CoapplicantIncome" placeholder="e.g. 2000" required>
                    </div>
                    <div class="form-group">
                        <label for="LoanAmount">Loan Amount (in thousands $)</label>
                        <input type="number" name="LoanAmount" id="LoanAmount" placeholder="e.g. 120" required>
                    </div>
                    <div class="form-group">
                        <label for="Loan_Amount_Term">Loan Term (in days)</label>
                        <select name="Loan_Amount_Term" id="Loan_Amount_Term" required>
                            <option value="">Select Term</option>
                            <option value="360">360 Days</option>
                            <option value="180">180 Days</option>
                            <option value="120">120 Days</option>
                            <option value="84">84 Days</option>
                            <option value="60">60 Days</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="Property_Area">Property Area</label>
                        <select name="Property_Area" id="Property_Area" required>
                            <option value="">Select Area</option>
                            <option value="Urban">Urban</option>
                            <option value="Semiurban">Semiurban</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Evaluate Loan Eligibility</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>&copy; 2024 Smart Lender. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
